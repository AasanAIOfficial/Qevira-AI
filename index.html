<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Qevira AI Dashboard</title><style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb}header{background:#111827;color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:bold}.container{max-width:900px;margin:30px auto;padding:16px}.card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.12);margin-bottom:20px}h2{margin-top:0}.btn{display:block;width:100%;padding:14px;margin-top:12px;border:none;border-radius:10px;font-size:16px;cursor:pointer}.chat{background:#2563eb;color:#fff}.history{background:#10b981;color:#fff}.settings{background:#f59e0b;color:#fff}.logout{background:#ef4444;color:#fff}small{color:#666}
</style></head><body>
<header>🤖 Qevira AI Dashboard</header>
<div class="container">
<div class="card"><h2>Welcome 👋</h2><p id="welcome">Welcome to Qevira AI</p><small>Your AI assistant is ready.</small></div>
<div class="card">
<button class="btn chat" onclick="alert('Chat page will be added in next step.')">💬 Start Chat</button>
<button class="btn history" onclick="alert('Chat History coming soon.')">🕒 Chat History</button>
<button class="btn settings" onclick="alert('Settings coming soon.')">⚙️ Settings</button>
<button class="btn logout" onclick="logout()">🚪 Logout</button>
</div></div>
<script type="module">
import { auth } from "./firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
const name=localStorage.getItem("userName");
if(name){document.getElementById("welcome").textContent="Welcome, "+name+" 👋";}
window.logout=async function(){try{await signOut(auth);}catch(e){} localStorage.removeItem("userName"); window.location.href="login.html";}
</script></body></html>
