<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Qevira AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
}

h2{
color:#38bdf8;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

a{
color:#38bdf8;
text-decoration:none;
}
<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<a href="index.html">← Back to Home</a>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUulx-T2-Crx3B6iTbBUSFkX7TeR4CTRY",
  authDomain: "qevira-ai.firebaseapp.com",
  projectId: "qevira-ai",
  storageBucket: "qevira-ai.firebasestorage.app",
  messagingSenderId: "123658483544",
  appId: "1:123658483544:web:c8ea77df216c90461b172d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {

  let email = document.querySelector('input[type="email"]').value.trim();
  let password = document.querySelector('input[type="password"]').value;

  if(email=="" || password==""){
    alert("Please fill all fields");
    return;
  }

  try {

    await signInWithEmailAndPassword(auth, email, password); 

    alert("Login Successful");

    window.location.href = "index.html";

  } catch(error) {

    alert(error.message);

  }

    };

  </script>
</body>
</html>
