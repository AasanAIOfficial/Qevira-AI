<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Qevira AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
}

h2{
color:#38bdf8;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

a{
color:#38bdf8;
text-decoration:none;
}
</style>

</head>
<body>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<a href="index.html">⬅ Back to Home</a>

</div>
<script>
function login(){

let email = document.querySelector('input[type="email"]').value;
let password = document.querySelector('input[type="password"]').value;

if(email=="admin@gmail.com" && password=="123456"){
alert("Login Successful");
window.location.href="index.html";
}else{
alert("Wrong Email or Password");
}

}
</script>
</body>
</html>
